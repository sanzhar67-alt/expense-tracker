<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Қазына - Қаржы трекері</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
        :root{--primary:#4361ee;--income:#2ecc71;--expense:#e74c3c;--bg:#f5f7fe;--surface:#fff;}
        body.dark{--bg:#0f172a;--surface:#1e293b;--primary:#818cf8;}
        body{background:var(--bg);padding:20px;transition:0.2s;}
        .app{max-width:800px;margin:0 auto;}
        .header{display:flex;justify-content:space-between;margin-bottom:28px;}
        .logo{font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,var(--primary),#a855f7);background-clip:text;-webkit-background-clip:text;color:transparent;}
        .theme-btn{background:var(--surface);border:1px solid #ddd;border-radius:40px;padding:8px 16px;cursor:pointer;}
        .balance-card{background:var(--surface);border-radius:24px;padding:24px;text-align:center;margin-bottom:28px;}
        .balance-amount{font-size:2.8rem;font-weight:800;margin:12px 0;}
        .balance-stats{display:flex;gap:16px;}
        .stat{flex:1;padding:10px;border-radius:20px;background:rgba(0,0,0,0.03);}
        .currency-bar{display:flex;justify-content:flex-end;gap:8px;margin-bottom:16px;}
        .currency-btn{background:var(--surface);border:1px solid #ddd;border-radius:30px;padding:6px 14px;cursor:pointer;}
        .currency-btn.active{background:var(--primary);color:#fff;}
        .transaction-list{display:flex;flex-direction:column;gap:12px;margin-bottom:28px;}
        .transaction-item{background:var(--surface);border-radius:20px;padding:16px;display:flex;justify-content:space-between;align-items:center;}
        .tx-amount.income{color:var(--income);}
        .tx-amount.expense{color:var(--expense);}
        .delete-btn{background:none;border:none;font-size:1.3rem;cursor:pointer;}
        .form-card{background:var(--surface);border-radius:24px;padding:24px;margin-top:20px;}
        input,select{width:100%;padding:12px;border-radius:20px;border:1px solid #ddd;margin-bottom:16px;}
        .submit-btn{background:var(--primary);color:#fff;border:none;padding:14px;border-radius:40px;width:100%;cursor:pointer;}
        .chart-container{background:var(--surface);border-radius:24px;padding:18px;margin-top:20px;}
        canvas{max-height:260px;}
    </style>
</head>
<body>
<div class="app">
    <div class="header"><h1 class="logo">Қазына 💰</h1><button class="theme-btn" id="themeToggle">🌙 Қараңғы</button></div>
    <div class="currency-bar"><button data-currency="KZT" class="currency-btn active">₸ KZT</button><button data-currency="USD" class="currency-btn">$ USD</button><button data-currency="EUR" class="currency-btn">€ EUR</button><button data-currency="RUB" class="currency-btn">₽ RUB</button></div>
    <div class="balance-card"><div>ЖАЛПЫ БАЛАНС</div><div class="balance-amount" id="balanceDisplay">0 ₸</div><div class="balance-stats"><div class="stat">📈 Кіріс <br><span id="totalIncome">0 ₸</span></div><div class="stat">📉 Шығыс <br><span id="totalExpense">0 ₸</span></div></div></div>
    <div id="transactionList" class="transaction-list"></div>
    <div class="form-card"><h3>➕ Жаңа транзакция</h3><input type="text" id="txTitle" placeholder="Атауы"><input type="number" id="txAmount" placeholder="Сома"><select id="txCategory"><option>Тамақ</option><option>Көлік</option><option>Жалақы</option><option>Демалыс</option></select><select id="txType"><option value="income">💰 Кіріс</option><option value="expense">💸 Шығыс</option></select><button class="submit-btn" id="addBtn">✅ Қосу</button></div>
    <div class="chart-container"><h4>📊 Шығыс диаграммасы</h4><canvas id="expenseChart"></canvas></div>
</div>
<script>
let transactions=[],currentCurrency='KZT',exchangeRates={KZT:1,USD:0.0021,EUR:0.0020,RUB:0.19},chart=null;
function save(){localStorage.setItem('txs',JSON.stringify(transactions));}
function load(){let s=localStorage.getItem('txs');if(s)transactions=JSON.parse(s);else transactions=[{id:1,title:"Жалақы",amount:250000,category:"Жалақы",type:"income"}];update();}
function conv(a){return a*exchangeRates[currentCurrency];}
function fmt(v){return v.toFixed(2)+' '+currentCurrency;}
function update(){let inc=0,exp=0;transactions.forEach(t=>{if(t.type=='income')inc+=t.amount;else exp+=t.amount;});document.getElementById('balanceDisplay').innerHTML=fmt(conv(inc-exp));document.getElementById('totalIncome').innerHTML=fmt(conv(inc));document.getElementById('totalExpense').innerHTML=fmt(conv(exp));let cont=document.getElementById('transactionList');if(!transactions.length){cont.innerHTML='<p>Транзакция жоқ</p>';return;}cont.innerHTML='';[...transactions].reverse().forEach(t=>{let d=document.createElement('div');d.className='transaction-item';d.innerHTML='<div><strong>'+t.title+'</strong><br><small>'+t.category+'</small></div><div><span class="tx-amount '+t.type+'">'+(t.type=='income'?'+':'-')+' '+fmt(conv(t.amount))+'</span><button class="delete-btn" data-id="'+t.id+'">✖️</button></div>';cont.appendChild(d);});document.querySelectorAll('.delete-btn').forEach(btn=>{btn.onclick=()=>{transactions=transactions.filter(t=>t.id!=btn.dataset.id);save();update();};});updateChart();}
function updateChart(){let ctx=document.getElementById('expenseChart').getContext('2d'),map={};transactions.filter(t=>t.type=='expense').forEach(t=>{map[t.category]=(map[t.category]||0)+t.amount;});if(chart)chart.destroy();chart=new Chart(ctx,{type:'pie',data:{labels:Object.keys(map),datasets:[{data:Object.values(map),backgroundColor:['#4361ee','#e74c3c','#f39c12','#2ecc71']}]}});}
document.getElementById('addBtn').onclick=()=>{let title=document.getElementById('txTitle').value,amount=parseFloat(document.getElementById('txAmount').value),cat=document.getElementById('txCategory').value,type=document.getElementById('txType').value;if(!title||amount<=0){alert('Атау мен сома дұрыс');return;}transactions.push({id:Date.now(),title,amount,category:cat,type,date:new Date()});save();update();document.getElementById('txTitle').value='';document.getElementById('txAmount').value='';};
document.querySelectorAll('.currency-btn').forEach(btn=>{btn.onclick=()=>{document.querySelectorAll('.currency-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentCurrency=btn.dataset.currency;update();};});
document.getElementById('themeToggle').onclick=()=>{document.body.classList.toggle('dark');};
load();
</script>
</body>
</html>
